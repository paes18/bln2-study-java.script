<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App Faiz</title>
   <link rel="icon" type="image/png" href="assets/aykon.png">
  <link rel="stylesheet" href="cuaca.css">
  
</head>
<body>

  <video autoplay muted loop playsinline id="bgVideo">
    <source id="videoSource" src="assets/video/sunny.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <main class="container">
    <h1>cuaca web</h1>
    <p class="sub">cek cuaca tempatmu di sini</p>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Masukkan nama kota...">
      <button onclick="getWeather()">Cari</button>
    </div>

    <section class="weather-card">
      <img id="weatherIcon" class="weather-img" src="assets/icons/sunny.png" alt="icon cuaca">

      <h2 id="cityName">Nama Kota</h2>
      <h3 id="temperature">--°C</h3>
      <p id="description">Cuaca hari ini</p>

      <div class="details">
        <div>
          <span id="humidity">--%</span>
          <p>Kelembapan</p>
        </div>

        <div>
          <span id="wind">-- m/s</span>
          <p>Angin</p>
        </div>
      </div>
    </section>
  </main>

  <script src="cuaca.js"></script>
</body>
</html>
