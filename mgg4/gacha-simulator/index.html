<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha anomali</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Gacha memes</h1>

        <div class="button-box">
            <button id="pull1">Pull x1</button>
            <button id="pull10">Pull x10</button>
            <button id="reset">Reset</button>
        </div>

        <div class="statistik">
            <h2>Statistik</h2>
            <p>Total Pull: <span id="total">0</span></p>
            <p>Common: <span id="common">0</span></p>
            <p>Rare: <span id="rare">0</span></p>
            <p>Epic: <span id="epic">0</span></p>
            <p>Legendary: <span id="legendary">0</span></p>
            <p>Pity: <span id="pity">0</span> / 30</p>
        </div>

        <h2>Hasil Pull</h2>
        <div id="hasil"></div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
